
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precedent Comparison Engine</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000' rx='15'/><text x='10' y='72' font-family='Arial Black' font-size='60' font-weight='900' fill='%23fff'>R</text><circle cx='70' cy='55' r='20' fill='%23ff6b00'/><path d='M70 25v-10M70 95v-10M100 55h-10M40 55h-10' stroke='%23ff6b00' stroke-width='5'/></svg>">
    
    <style>
        :root { --accent: #ff6b00; --sidebar-w: 240px; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-w); background: #f4f4f4; border-right: 2px solid #000; display: flex; flex-direction: column; padding: 20px; z-index: 10; overflow-y: auto; }
        .sidebar h1 { font-size: 13px; letter-spacing: -0.5px; margin-bottom: 25px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        /* Controls */
        .control-group { margin-bottom: 25px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .control-label { font-size: 10px; font-weight: 900; color: #444; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .toggle-btn { width: 100%; padding: 10px; background: #ddd; border: none; cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; text-align: left; transition: 0.2s; }
        .toggle-btn.active { background: var(--accent); color: #fff; }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); margin: 10px 0; }
        .slider-data { font-size: 10px; font-weight: bold; color: var(--accent); display: flex; justify-content: space-between; }

        /* Viewport */
        .viewport { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #fff; }
        .main-view { display: flex; gap: 20px; padding: 30px; justify-content: center; align-items: flex-start; }
        
        .column { flex: 1; max-width: 480px; display: flex; flex-direction: column; }
        .img-wrap { position: relative; width: 100%; border: 1px solid #ddd; background: #fff; line-height: 0; }
        .img-wrap img { width: 100%; height: auto; max-height: 45vh; object-fit: contain; }

        /* SVG Overlays */
        .hotspot-group { transition: opacity 0.3s; opacity: 0; pointer-events: none; }
        .show-features .hotspot-group { opacity: 1; pointer-events: auto; }
        .hotspot { fill: rgba(255, 107, 0, 0.05); stroke: var(--accent); stroke-width: 1.2; }
        .box-label { fill: var(--accent); font-size: 3.5px; font-weight: 900; pointer-events: none; }
        .prop-label { fill: #000; font-size: 3px; font-weight: 400; opacity: 0; transition: 0.3s; }
        .show-props .prop-label { opacity: 1; }

        /* Solar/Beam Effects */
        .sun-obj { fill: #FFD700; stroke: var(--accent); stroke-width: 0.5; opacity: 0; transition: 0.2s; }
        .show-sun .sun-obj { opacity: 1; }
        .light-beam { fill: rgba(255, 215, 0, 0.4); filter: blur(2px); display: none; }
        .alignment-active .light-beam { display: block; }

        .synth-card { background: #000; color: #fff; padding: 12px; margin-top: 15px; font-size: 11px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body class="show-features">

<div class="sidebar">
    <h1>PRECEDENT<br>ENGINE v2.3</h1>
    
    <div class="control-group">
        <span class="control-label">Visual Analysis</span>
        <button id="featToggle" class="toggle-btn active" onclick="toggleFeatures()">Feature ID: ON</button>
        <button id="propToggle" class="toggle-btn" onclick="toggleProps()">Proportions: OFF</button>
    </div>

    <div class="control-group">
        <span class="control-label">Solar & Feast Day</span>
        <button id="sunToggle" class="toggle-btn" onclick="toggleSun()">Solar Path: OFF</button>
        
        <label class="control-label" style="margin-top:15px;">Time (Hour)</label>
        <input type="range" id="hourSlider" min="6" max="18" value="12" oninput="updateSolar()">
        <div class="slider-data"><span id="hourLabel">12:00</span></div>

        <label class="control-label" style="margin-top:15px;">Calendar (Month)</label>
        <input type="range" id="monthSlider" min="1" max="12" value="6" oninput="updateSolar()">
        <div class="slider-data"><span id="monthLabel">June (Solstice)</span></div>
    </div>

    <div style="margin-top: auto; font-size: 9px; color: #999;">
        &copy; 2026 [YOUR NAME]
    </div>
</div>

<div class="viewport">
    <div id="view" class="main-view"></div>
</div>

<script src="database.js"></script>
<script>
    let featuresActive = true;
    let propsActive = false;
    let sunActive = false;

    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    function toggleFeatures() {
        featuresActive = !featuresActive;
        document.body.classList.toggle('show-features', featuresActive);
        updateBtn('featToggle', 'Feature ID', featuresActive);
    }

    function toggleProps() {
        propsActive = !propsActive;
        document.body.classList.toggle('show-props', propsActive);
        updateBtn('propToggle', 'Proportions', propsActive);
    }

    function toggleSun() {
        sunActive = !sunActive;
        document.body.classList.toggle('show-sun', sunActive);
        updateBtn('sunToggle', 'Solar Path', sunActive);
    }

    function updateBtn(id, label, state) {
        const btn = document.getElementById(id);
        btn.innerText = `${label}: ${state ? 'ON' : 'OFF'}`;
        btn.classList.toggle('active', state);
    }

    function updateSolar() {
        const hour = document.getElementById('hourSlider').value;
        const month = document.getElementById('monthSlider').value;
        document.getElementById('hourLabel').innerText = `${hour}:00`;
        document.getElementById('monthLabel').innerText = `${months[month-1]} Analysis`;

        // Calculate Sun Position
        const sunX = 15 + ((hour - 6) * 6.2);
        const sunY = 50 - (Math.sin((hour - 6) * (Math.PI / 12)) * (40 - (Math.abs(6 - month) * 2)));

        document.querySelectorAll('.sun-obj').forEach(sun => {
            sun.setAttribute('cx', sunX);
            sun.setAttribute('cy', sunY);
        });

        // Toggle "Feast Day Beam" logic
        const isAligned = (hour < 9 && month > 10); // Simple Winter Sunrise logic
        document.body.classList.toggle('alignment-active', isAligned && sunActive);
    }

    function render() {
        const view = document.getElementById('view');
        if (typeof siteData === 'undefined') return;

        view.innerHTML = siteData.map(s => `
            <div class="column">
                <div style="font-size: 9px; font-weight: 900; color: var(--accent);">${s.bucket}</div>
                <h2 style="margin: 5px 0 15px 0; font-size: 1.4rem;">${s.name}</h2>
                
                <div class="img-wrap">
                    <img src="${s.plan_url}">
                    <svg viewBox="0 0 100 100" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
                        <polygon class="light-beam" points="0,0 30,15 35,25 10,40" />
                        ${s.labels.map(l => `
                            <g class="hotspot-group">
                                <rect x="${l.x}" y="${l.y}" width="${l.w}" height="${l.h}" class="hotspot"></rect>
                                <text x="${l.x + 1}" y="${l.y + 4}" class="box-label">${l.name}</text>
                                <text x="${l.x + 1}" y="${l.y + 8.5}" class="prop-label">${l.prop}</text>
                            </g>
                        `).join('')}
                        <circle cx="50" cy="10" r="3" class="sun-obj"></circle>
                    </svg>
                </div>
                <div class="synth-card"><strong>ANALYSIS:</strong><br>${s.synthesis}</div>
            </div>`).join('');
    }
    window.onload = () => { render(); updateSolar(); };
</script>
</body>
</html>
