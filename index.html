<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Orientation + Shadow Simulation</title>
    <style>
        :root { --accent: #ff4500; --bg: #ffffff; }
        body { margin: 0; font-family: 'Georgia', serif; color: #333; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .logo { cursor: pointer; font-weight: bold; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; }
        #main-container { flex: 1; position: relative; }
        #landing-page { position: absolute; z-index: 10; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-project { padding: 15px 30px; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 1rem; }
        #canvas-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #controls { position: absolute; bottom: 20px; left: 20px; z-index: 5; background: rgba(255,255,255,0.9); padding: 15px; border: 1px solid #ddd; display: none; }
    </style>
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
</head>
<body>
<header><div class="logo" onclick="location.reload()">SOLAR ORIENTATION + SHADOW SIMULATION</div></header>
<div id="main-container">
    <div id="landing-page">
        <h1>SOLAR ORIENTATION + SHADOW SIMULATION</h1>
        <button id="start-project">START PROJECT</button>
    </div>
    <div id="canvas-wrapper"></div>
</div>
<div id="controls">
    <button id="btn-soane">Soane Hall</button>
    <button id="btn-tadoando">Tadoando Church</button>
    <br><br>
    <label>SOLAR TIME</label>
    <input type="range" id="hour" min="8" max="17" step="0.01" value="10.5">
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun;
    let modelGroup = new THREE.Group();
    const container = document.getElementById('canvas-wrapper');
    const SF = 20; // 20x Scale Factor

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(70, container.clientWidth / container.clientHeight, 0.1, 50000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        
        sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.castShadow = true;
        sun.shadow.camera.left = -20000; sun.shadow.camera.right = 20000;
        sun.shadow.camera.top = 20000; sun.shadow.camera.bottom = -20000;
        sun.shadow.camera.near = 1; sun.shadow.camera.far = 50000;
        sun.shadow.mapSize.set(4096, 4096);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));
        scene.add(modelGroup);

        document.getElementById('start-project').onclick = () => {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            switchModel('tadoando');
            animate();
        };

        document.getElementById('btn-soane').addEventListener('click', () => switchModel('soane'));
        document.getElementById('btn-tadoando').addEventListener('click', () => switchModel('tadoando'));
    }

    function switchModel(type) {
        modelGroup.clear();
        if(type === 'soane') {
            camera.position.set(0, 100, 300);
            controls.target.set(0, 15, 0);
            controls.maxDistance = 1000;
            buildSoaneHall();
        } else {
            camera.position.set(0, 0, 6000); 
            controls.target.set(0, 0, -6000);
            controls.maxDistance = 8000; // Bound to interior
            buildTadoandoHall();
        }
    }

    function buildSoaneHall() {
        const mat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        for(let x of [-15, 15]) for(let z of [-15, 15]) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(10, 30, 10), mat);
            p.position.set(x, 5, z);
            modelGroup.add(p);
        }
    }

    function buildTadoandoHall() {
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.BackSide });
        const nave = new THREE.Mesh(new THREE.BoxGeometry(150*SF, 150*SF, 900*SF), wallMat);
        nave.position.set(0, 75*SF, -150*SF);
        const transept = new THREE.Mesh(new THREE.BoxGeometry(500*SF, 150*SF, 150*SF), wallMat);
        transept.position.set(0, 75*SF, -300*SF);
        modelGroup.add(nave, transept);

        const shape = new THREE.Shape();
        shape.moveTo(-250*SF, -250*SF); shape.lineTo(250*SF, -250*SF); shape.lineTo(250*SF, 250*SF); shape.lineTo(-250*SF, 250*SF);
        const h = new THREE.Path();
        h.moveTo(-50*SF, 100*SF); h.lineTo(50*SF, 100*SF); h.lineTo(50*SF, 50*SF); h.lineTo(100*SF, 50*SF); h.lineTo(100*SF, -50*SF); h.lineTo(50*SF, -50*SF);
        h.lineTo(50*SF, -150*SF); h.lineTo(-50*SF, -150*SF); h.lineTo(-50*SF, -50*SF); h.lineTo(-100*SF, -50*SF); h.lineTo(-100*SF, 50*SF); h.lineTo(-50*SF, 50*SF);
        shape.holes.push(h);
        const altarWall = new THREE.Mesh(new THREE.ShapeGeometry(shape), wallMat);
        altarWall.position.set(0, 75*SF, -600*SF);
        modelGroup.add(altarWall);
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const angle = (hr - 12) * (Math.PI / 6);
        sun.position.set(Math.sin(angle) * 20000, 10000, Math.cos(angle) * 20000);
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
