<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precedent Engine: Soane Cathedral</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000' rx='15'/><text x='12' y='72' font-family='Arial Black' font-size='65' font-weight='900' fill='%23fff'>R</text><circle cx='70' cy='40' r='25' fill='%23ff6b00'/></svg>">
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
    <style>
        :root { --accent: #ff4500; }
        body { margin: 0; background: #fff; display: flex; height: 100vh; font-family: 'Georgia', serif; overflow: hidden; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; padding: 25px; background: #fdfdfd; z-index: 10; display: flex; flex-direction: column; }
        .btn-jump { background: #000; color: #fff; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.2s; }
        .btn-jump:hover { background: var(--accent); }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .data-out { font-size: 14px; font-weight: bold; color: var(--accent); font-family: monospace; margin-top: 5px; }
        #canvas-container { flex: 1; position: relative; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="font-size: 14px; letter-spacing: 1px;">SOANE ARCHIVE v12</h2>
    <button class="btn-jump" id="viewToggle">JUMP TO INTERIOR</button>
    
    <div style="margin-bottom:20px;">
        <label style="font-size:10px; font-weight:bold; color:#777;">SOLAR TIME</label>
        <input type="range" id="hour" min="7" max="18" step="0.01" value="11">
        <div id="hourVal" class="data-out">11:00 AM</div>
    </div>

    <div style="margin-top:auto; font-size:10px; color:#999; border-top:1px solid #eee; padding-top:15px;">
        Shadows calculated for 53.3° N (Ireland).<br>
        &copy; 2026 R4 All Rights Reserved.
    </div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun, currentView = 'exterior';
    let churchModel;
    const container = document.getElementById('canvas-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 3000);
        camera.position.set(60, 40, 60);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096);
        sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
        sun.shadow.camera.top = 100; sun.shadow.camera.bottom = -100;
        scene.add(sun);

        buildElaborateChurch();
        animate();

        document.getElementById('viewToggle').onclick = toggle;
    }

    function buildElaborateChurch() {
        churchModel = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });

        // 1. Massive Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), mat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -10;
        floor.receiveShadow = true;
        churchModel.add(floor);

        // 2. Nave & Transepts (Church Cross Shape)
        const nave = new THREE.Mesh(new THREE.BoxGeometry(80, 20, 20), mat);
        nave.position.set(-10, 0, 0);
        nave.castShadow = nave.receiveShadow = true;
        churchModel.add(nave);

        const transept = new THREE.Mesh(new THREE.BoxGeometry(20, 20, 60), mat);
        transept.position.set(20, 0, 0);
        transept.castShadow = transept.receiveShadow = true;
        churchModel.add(transept);

        // 3. Pendentive Crossing (The Base for the Drum)
        const crossing = new THREE.Mesh(new THREE.BoxGeometry(20, 30, 20), mat);
        crossing.position.set(20, 5, 0);
        crossing.castShadow = crossing.receiveShadow = true;
        churchModel.add(crossing);

        // 4. Drum with 12 Arched Windows
        const drum = new THREE.Group();
        const drumRadius = 9;
        const drumMesh = new THREE.Mesh(new THREE.CylinderGeometry(drumRadius, drumRadius, 10, 32, 1, true), mat);
        drumMesh.position.set(20, 25, 0);
        drum.add(drumMesh);

        // 12 Window Voids (Simulated with Emissive Red glass)
        const glassMat = new THREE.MeshBasicMaterial({ color: 0xff4500, transparent: true, opacity: 0.7 });
        for(let i=0; i<12; i++) {
            const win = new THREE.Mesh(new THREE.PlaneGeometry(3, 7), glassMat);
            const ang = (i / 12) * Math.PI * 2;
            win.position.set(20 + Math.cos(ang) * 8.9, 25, Math.sin(ang) * 8.9);
            win.lookAt(20, 25, 0);
            drum.add(win);
        }
        churchModel.add(drum);

        // 5. Shallow Soane Dome
        const dome = new THREE.Mesh(new THREE.SphereGeometry(drumRadius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2), mat);
        dome.position.set(20, 30, 0);
        dome.castShadow = true;
        churchModel.add(dome);

        scene.add(churchModel);
    }

    function toggle() {
        currentView = currentView === 'exterior' ? 'interior' : 'exterior';
        if(currentView === 'interior') {
            camera.position.set(20, -8, 0); // GROUND LEVEL IN CROSSING
            controls.target.set(20, 50, 0); // LOOKING STRAIGHT UP AT DOME
            document.getElementById('viewToggle').innerText = "BACK TO EXTERIOR";
        } else {
            camera.position.set(60, 40, 60);
            controls.target.set(0, 0, 0);
            document.getElementById('viewToggle').innerText = "JUMP TO INTERIOR";
        }
        controls.update();
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const dispMin = Math.floor((hr % 1) * 60).toString().padStart(2, '0');
        document.getElementById('hourVal').innerText = `${Math.floor(hr)}:${dispMin}`;

        const angle = (hr - 12) * (Math.PI / 6);
        sun.position.set(Math.sin(angle) * 100, 80, Math.cos(angle) * 100);
        
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
