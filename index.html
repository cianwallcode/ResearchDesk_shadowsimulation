<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Orientation + Shadow Simulation</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; display: flex; height: 100vh; }
        #app { display: flex; flex: 1; height: 100vh; }
        #main-view { flex: 3; position: relative; border-right: 2px solid #444; }
        #gizmo-view { flex: 1; position: relative; background: #050505; }
        #controls { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 20px; border: 1px solid #444; z-index: 10;}
        button { background: #333; color: white; border: 1px solid #555; padding: 8px 12px; cursor: pointer; }
        button:hover { background: #555; }
        input[type=range] { width: 150px; display: block; margin-top: 10px; }
    </style>
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
</head>
<body>
<div id="app">
    <div id="main-view"></div>
    <div id="gizmo-view"></div>
</div>
<div id="controls">
    <button id="btn-tadoando">Tadoando</button>
    <button id="btn-soane">Soane</button>
    <input type="range" id="hour" min="0" max="24" step="0.01" value="12">
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const mainView = document.getElementById('main-view');
    const gizmoView = document.getElementById('gizmo-view');
    
    let scene, camera, renderer, sun, modelGroup;
    let gizmoScene, gizmoCamera, gizmoRenderer, sunMarker;

    function init() {
        // --- Main Scene ---
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        camera = new THREE.PerspectiveCamera(50, mainView.clientWidth / mainView.clientHeight, 1, 5000);
        camera.position.set(400, 300, 800);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(mainView.clientWidth, mainView.clientHeight);
        renderer.shadowMap.enabled = true;
        mainView.appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.1));
        
        sun = new THREE.DirectionalLight(0xffffff, 4);
        sun.castShadow = true;
        sun.shadow.camera.set(-600, 600, 600, -600, 1, 2000);
        scene.add(sun);
        modelGroup = new THREE.Group();
        scene.add(modelGroup);

        // --- Gizmo Scene ---
        gizmoScene = new THREE.Scene();
        // Orthographic camera for true axonometric projection
        const aspect = gizmoView.clientWidth / gizmoView.clientHeight;
        gizmoCamera = new THREE.OrthographicCamera(-150 * aspect, 150 * aspect, 150, -150, 1, 1000);
        gizmoCamera.position.set(200, 200, 200);
        gizmoCamera.lookAt(0, 0, 0);
        gizmoRenderer = new THREE.WebGLRenderer({ antialias: true });
        gizmoRenderer.setSize(gizmoView.clientWidth, gizmoView.clientHeight);
        gizmoView.appendChild(gizmoRenderer.domElement);
        
        gizmoScene.add(new THREE.AmbientLight(0xffffff, 1));
        const grid = new THREE.GridHelper(200, 10, 0xffffff, 0x444444);
        gizmoScene.add(grid);
        
        // Sun Path Marker
        sunMarker = new THREE.Mesh(new THREE.SphereGeometry(10), new THREE.MeshBasicMaterial({color: 0xff4500}));
        gizmoScene.add(sunMarker);

        document.getElementById('btn-tadoando').onclick = () => switchMode('tadoando');
        document.getElementById('btn-soane').onclick = () => switchMode('soane');

        switchMode('tadoando');
        animate();
    }

    function switchMode(mode) {
        modelGroup.clear();
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshStandardMaterial({color: 0x111111}));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        modelGroup.add(floor);

        if (mode === 'tadoando') {
            const wallShape = new THREE.Shape();
            wallShape.moveTo(-400, -200); wallShape.lineTo(400, -200); wallShape.lineTo(400, 200); wallShape.lineTo(-400, 200);
            const hole = new THREE.Path();
            hole.moveTo(-12, 100); hole.lineTo(12, 100); hole.lineTo(12, 25); hole.lineTo(50, 25); 
            hole.lineTo(50, -25); hole.lineTo(12, -25); hole.lineTo(12, -150); hole.lineTo(-12, -150); 
            hole.lineTo(-12, -25); hole.lineTo(-50, -25); hole.lineTo(-50, 25); hole.lineTo(-12, 25);
            hole.lineTo(-12, 100);
            wallShape.holes.push(hole);
            const wall = new THREE.Mesh(new THREE.ExtrudeGeometry(wallShape, { depth: 20, bevelEnabled: false }), new THREE.MeshStandardMaterial({ color: 0x888888 }));
            wall.position.set(0, 200, -400);
            wall.castShadow = true;
            modelGroup.add(wall);
        } else {
            for(let x of [-200, 200]) for(let z of [-200, 200]) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(50, 400, 50), new THREE.MeshStandardMaterial({ color: 0x888888 }));
                p.position.set(x, 200, z);
                p.castShadow = true;
                modelGroup.add(p);
            }
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const angle = (hr / 24) * Math.PI * 2;
        
        // Sun movement
        sun.position.set(Math.sin(angle) * 700, 250, Math.cos(angle) * 700);
        
        // Gizmo Sun marker (Top-down view of the sun path)
        sunMarker.position.set(Math.sin(angle) * 80, 0, Math.cos(angle) * 80);
        
        renderer.render(scene, camera);
        gizmoRenderer.render(gizmoScene, gizmoCamera);
    }
    
    init();
</script>
</body>
</html>
