<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Orientation + Shadow Simulation</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text x=%2230%22 y=%2270%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2260%22 fill=%22%23ff4500%22 text-anchor=%22middle%22>R</text><path d=%22M65 40 L85 40 L85 75 L65 75 Z M70 40 L70 30 L80 30 L80 40 Z M72 30 L75 22 L78 30 Z%22 fill=%22white%22/></svg>">
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
    <style>
        :root { --accent: #ff4500; --bg: #ffffff; }
        body { margin: 0; font-family: 'Georgia', serif; color: #333; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .logo { cursor: pointer; font-weight: bold; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; }
        #main-container { flex: 1; position: relative; overflow-y: auto; }
        #landing-page { position: absolute; z-index: 10; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-project { padding: 15px 30px; background: var(--accent); color: white; border: none; cursor: pointer; font-size: 1rem; }
        #canvas-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #controls { position: absolute; bottom: 20px; left: 20px; z-index: 5; background: rgba(255,255,255,0.9); padding: 15px; border: 1px solid #ddd; }
        footer { padding: 10px; border-top: 1px solid #ddd; font-size: 10px; color: #777; text-align: center; }
    </style>
</head>
<body>
<header><div class="logo" onclick="location.reload()">SOLAR ORIENTATION + SHADOW SIMULATION</div></header>
<div id="main-container">
    <div id="landing-page">
        <h1>SOLAR ORIENTATION + SHADOW SIMULATION</h1>
        <button id="start-project">START PROJECT</button>
    </div>
    <div id="canvas-wrapper"></div>
</div>
<div id="controls" style="display: none;">
    <button id="btn-soane">Soane Hall</button>
    <button id="btn-tadoando">Tadoando Church</button>
    <br><br>
    <label>SOLAR TIME</label>
    <input type="range" id="hour" min="8" max="17" step="0.01" value="10.5">
</div>
<footer>&copy; 2026 R4 / Solar Orientation Simulation | Contact: admin@solar-simulation.com</footer>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun;
    let modelGroup = new THREE.Group();
    const container = document.getElementById('canvas-wrapper');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        camera = new THREE.PerspectiveCamera(70, container.clientWidth / container.clientHeight, 0.1, 3000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        controls = new OrbitControls(camera, renderer.domElement);
        
        sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.castShadow = true;
        sun.shadow.camera.left = -500; sun.shadow.camera.right = 500;
        sun.shadow.camera.top = 500; sun.shadow.camera.bottom = -500;
        sun.shadow.mapSize.set(2048, 2048);
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));
        scene.add(modelGroup);

        document.getElementById('start-project').onclick = () => {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            switchModel('tadoando');
            animate();
        };

        document.getElementById('btn-soane').addEventListener('click', () => switchModel('soane'));
        document.getElementById('btn-tadoando').addEventListener('click', () => switchModel('tadoando'));
    }

    function switchModel(type) {
        modelGroup.clear();
        if(type === 'soane') {
            camera.position.set(0, 100, 150);
            controls.target.set(0, 15, 0);
            buildSoaneHall();
        } else {
            // Restore interior view
            camera.position.set(0, 60, 200); 
            controls.target.set(0, 60, -500); 
            buildTadoandoHall();
        }
    }

    function buildSoaneHall() {
        const mat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        for(let x of [-15, 15]) for(let z of [-15, 15]) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(10, 30, 10), mat);
            p.position.set(x, 5, z);
            modelGroup.add(p);
        }
    }

    function buildTadoandoHall() {
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });
        
        // Expanded Cruciform Footprint
        const nave = new THREE.Mesh(new THREE.BoxGeometry(120, 120, 800), wallMat);
        const transept = new THREE.Mesh(new THREE.BoxGeometry(400, 120, 120), wallMat);
        nave.position.set(0, 60, -100);
        transept.position.set(0, 60, -200);
        modelGroup.add(nave, transept);

        // Cruciform Window (Far wall)
        const shape = new THREE.Shape();
        shape.moveTo(-200, -200); shape.lineTo(200, -200); shape.lineTo(200, 200); shape.lineTo(-200, 200);
        const h = new THREE.Path();
        h.moveTo(-40, 80); h.lineTo(40, 80); h.lineTo(40, 40); h.lineTo(80, 40); h.lineTo(80, -40); h.lineTo(40, -40);
        h.lineTo(40, -120); h.lineTo(-40, -120); h.lineTo(-40, -40); h.lineTo(-80, -40); h.lineTo(-80, 40); h.lineTo(-40, 40);
        shape.holes.push(h);

        const crossWall = new THREE.Mesh(new THREE.ShapeGeometry(shape), wallMat);
        crossWall.position.set(0, 60, -500);
        modelGroup.add(crossWall);
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        const angle = (hr - 12) * (Math.PI / 6);
        sun.position.set(Math.sin(angle) * 800, 500, Math.cos(angle) * 800);
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
