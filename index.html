<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precedent Engine 3D</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000' rx='15'/><text x='12' y='72' font-family='Arial Black' font-size='65' font-weight='900' fill='%23fff'>R</text><circle cx='70' cy='40' r='25' fill='%23ff6b00'/></svg>">
    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
    </script>
    <style>
        :root { --accent: #ff4500; }
        body { margin: 0; background: #fff; display: flex; height: 100vh; font-family: sans-serif; }
        .sidebar { width: 280px; border-right: 1px solid #ddd; padding: 20px; background: #fdfdfd; z-index: 10; }
        .btn-jump { background: #000; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        #canvas-container { flex: 1; background: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="font-size:12px;">PRECEDENT ENGINE</h2>
    <button class="btn-jump" id="viewToggle">JUMP TO SOANE INTERIOR</button>
    <label style="font-size:9px;">SOLAR TIME</label>
    <input type="range" id="hour" min="8" max="18" step="0.01" value="12" style="width:100%; accent-color:var(--accent);">
    <div id="hourVal" style="font-weight:bold; color:var(--accent);">12:00</div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, sun, currentView = 'exterior';
    let exteriorGroup, interiorGroup;
    const container = document.getElementById('canvas-container');

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.castShadow = true;
        scene.add(sun);

        buildModels();
        animate();

        document.getElementById('viewToggle').onclick = toggle;
    }

    function buildModels() {
        // Exterior
        exteriorGroup = new THREE.Group();
        const extBox = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 10), new THREE.MeshStandardMaterial({color:0xdddddd}));
        extBox.castShadow = true;
        exteriorGroup.add(extBox);
        scene.add(exteriorGroup);

        // Interior (Soane)
        interiorGroup = new THREE.Group();
        const intFloor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshStandardMaterial({color:0xffffff}));
        intFloor.rotation.x = -Math.PI/2;
        intFloor.position.y = -5;
        intFloor.receiveShadow = true;
        interiorGroup.add(intFloor);

        // Red Lantern
        const lantern = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color:0x8b0000, emissive:0xff0000, emissiveIntensity:2}));
        lantern.position.y = 10;
        interiorGroup.add(lantern);

        const redLight = new THREE.PointLight(0xff0000, 20, 30);
        redLight.position.y = 10;
        redLight.castShadow = true;
        interiorGroup.add(redLight);

        interiorGroup.visible = false;
        scene.add(interiorGroup);
    }

    function toggle() {
        currentView = currentView === 'exterior' ? 'interior' : 'exterior';
        exteriorGroup.visible = (currentView === 'exterior');
        interiorGroup.visible = (currentView === 'interior');
        
        if(currentView === 'interior') {
            camera.position.set(0, 0, 15); // Safe Interior Spawn
            controls.target.set(0, 0, 0);
        } else {
            camera.position.set(20, 15, 20);
            controls.target.set(0, 0, 0);
        }
        controls.update();
    }

    function animate() {
        requestAnimationFrame(animate);
        const hr = document.getElementById('hour').value;
        document.getElementById('hourVal').innerText = Math.floor(hr) + ":00";
        const angle = (hr - 12) * 0.5;
        sun.position.set(Math.sin(angle)*30, 20, Math.cos(angle)*30);
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
